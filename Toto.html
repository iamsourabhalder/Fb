<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub API Portal</title>
    <style>
        /* Modern Base Styles */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --warning: #f59e0b;
            --bg-gray: #f3f4f6;
            --text-gray: #374151;
            --border-gray: #d1d5db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            color: var(--text-gray);
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
            color: #1f2937;
        }

        /* API Settings Box */
        .api-config {
            background-color: #eff6ff;
            border: 1px solid #dbeafe;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .api-config label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e40af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        /* Form Elements */
        .form-group { margin-bottom: 1rem; }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        input[type="text"], input[type="password"], input[type="tel"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: 0.375rem;
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-gray);
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 0.5rem 0;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
        }

        .tab-active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.375rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-blue { background-color: var(--primary); }
        .btn-green { background-color: var(--success); }
        .btn-warning { background-color: var(--warning); color: #000; }

        /* Loader */
        .loader {
            border: 2px solid #f3f3f3;
            border-radius: 50%;
            border-top: 2px solid currentColor;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            text-align: center;
            word-break: break-all;
        }

        .success-msg { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .error-msg { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .hidden { display: none; }

        .edit-area {
            background: #fafafa;
            border: 1px dashed #ccc;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GitHub User Portal</h1>
        
        <div class="api-config">
            <label>GitHub API Configuration</label>
            <div class="form-group">
                <input type="password" id="ghToken" placeholder="GitHub PAT Token">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <input type="text" id="ghRepo" placeholder="Owner/Repo-Name">
            </div>
        </div>

        <div class="tabs">
            <button onclick="switchTab('register')" id="tab-register" class="tab tab-active">Register</button>
            <button onclick="switchTab('login')" id="tab-login" class="tab">Login</button>
            <button onclick="switchTab('edit')" id="tab-edit" class="tab">Edit Data</button>
        </div>

        <!-- Registration Form -->
        <div id="register-section">
            <form id="submissionForm">
                <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="mobile" required></div>
                <div class="form-group"><label>ID Card Number</label><input type="text" id="idCard" required></div>
                <div class="form-group"><label>Upload Target File</label><input type="file" id="targetFile" required></div>
                <button type="submit" id="regBtn" class="btn btn-blue">
                    <span id="regLoader" class="loader hidden"></span>
                    <span>Submit & Register</span>
                </button>
            </form>
        </div>

        <!-- Login Form -->
        <div id="login-section" class="hidden">
            <form id="loginForm">
                <div class="form-group"><label>Username</label><input type="text" id="loginUser" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div>
                <button type="submit" id="loginBtn" class="btn btn-green">
                    <span id="loginLoader" class="loader hidden"></span>
                    <span>Login & Open Page</span>
                </button>
            </form>
        </div>

        <!-- Edit Form -->
        <div id="edit-section" class="hidden">
            <div id="edit-search">
                <div class="form-group"><input type="text" id="editUser" placeholder="Username"></div>
                <div class="form-group"><input type="password" id="editPass" placeholder="Password"></div>
                <button onclick="fetchDataForEdit()" id="fetchBtn" class="btn btn-blue">
                    <span id="fetchLoader" class="loader hidden"></span>
                    Fetch My Data
                </button>
            </div>
            <div id="edit-fields" class="edit-area hidden">
                <div class="form-group"><label>Password</label><input type="text" id="u_password"></div>
                <div class="form-group"><label>Mobile</label><input type="tel" id="u_mobile"></div>
                <div class="form-group"><label>ID Card</label><input type="text" id="u_idCard"></div>
                <button onclick="saveEditedData()" id="saveEditBtn" class="btn btn-warning">
                    <span id="editLoader" class="loader hidden"></span>
                    Update My Info
                </button>
            </div>
        </div>

        <div id="status" class="status-box hidden"></div>
    </div>

    <script>
        const config = { dataFilePath: 'data.json' };
        let currentLogs = [];
        let editingIndex = -1;

        function switchTab(tab) {
            ['register-section', 'login-section', 'edit-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
            ['tab-register', 'tab-login', 'tab-edit'].forEach(t => document.getElementById(t).classList.remove('tab-active'));
            document.getElementById(tab + '-section').classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('status').classList.add('hidden');
        }

        async function fetchGithubFile(repo, token, path) {
            // Added cache-busting timestamp to prevent stale "Failed to fetch" errors
            const url = `https://api.github.com/repos/${repo}/contents/${path}?t=${Date.now()}`;
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (response.status === 404) return null;
                if (response.status === 401) throw new Error("Invalid GitHub Token (Unauthorized)");
                if (!response.ok) throw new Error(`GitHub Error: ${response.statusText}`);
                return await response.json();
            } catch (err) {
                if (err.message.includes('Failed to fetch')) throw new Error("Network Error: Check internet or Token/Repo path.");
                throw err;
            }
        }

        async function updateGithubFile(repo, token, path, content, message) {
            const existingFile = await fetchGithubFile(repo, token, path);
            const sha = existingFile ? existingFile.sha : undefined;

            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: sha
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.message || "Failed to save to GitHub");
            }
        }

        function generateProfileHTML(user, idCard, mobile) {
            return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Profile: ${user}</title><style>body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f2f5; margin: 0; } .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; } .info { text-align: left; background: #f9f9f9; padding: 1rem; border-radius: 8px; margin: 1rem 0; } .row { margin-bottom: 0.5rem; display: flex; justify-content: space-between; font-size: 0.9rem; } .label { font-weight: bold; color: #666; }</style></head><body><div class="card"><h1>Welcome, ${user}</h1><div class="info"><div class="row"><span class="label">ID Card:</span> <span>${idCard}</span></div><div class="row"><span class="label">Mobile:</span> <span>${mobile}</span></div></div><p style="font-size:0.7rem; color:#999">Last updated: ${new Date().toLocaleString()}</p></div></body></html>`;
        }

        document.getElementById('submissionForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            if(!token || !repo) return showMessage("Provide Token & Repo Path", "error");

            document.getElementById('regLoader').classList.remove('hidden');
            try {
                const existing = await fetchGithubFile(repo, token, config.dataFilePath);
                let logs = existing ? JSON.parse(atob(existing.content)) : [];
                
                const user = document.getElementById('username').value;
                const idCard = document.getElementById('idCard').value;
                const mobile = document.getElementById('mobile').value;
                const safeName = user.toLowerCase().replace(/\s+/g, '-');
                const pagePath = `pages/${safeName}-${Date.now()}.html`;
                
                const entry = { 
                    username: user, password: document.getElementById('password').value, 
                    mobile, idCard, fileName: document.getElementById('targetFile').files[0].name, 
                    pagePath, timestamp: new Date().toISOString() 
                };
                
                logs.push(entry);
                await updateGithubFile(repo, token, config.dataFilePath, JSON.stringify(logs, null, 2), `Reg: ${user}`);
                await updateGithubFile(repo, token, pagePath, generateProfileHTML(user, idCard, mobile), `Profile: ${user}`);

                showMessage('Success! Redirecting to local file...', 'success');
                setTimeout(() => window.location.href = URL.createObjectURL(document.getElementById('targetFile').files[0]), 1500);
            } catch (err) { showMessage(err.message, 'error'); } 
            finally { document.getElementById('regLoader').classList.add('hidden'); }
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            document.getElementById('loginLoader').classList.remove('hidden');
            try {
                const existing = await fetchGithubFile(repo, token, config.dataFilePath);
                if (!existing) throw new Error("Database file (data.json) not found in repo.");
                const logs = JSON.parse(atob(existing.content));
                const found = logs.find(u => u.username === document.getElementById('loginUser').value && u.password === document.getElementById('loginPass').value);
                if (found) {
                    showMessage('Success!', 'success');
                    window.open(`https://raw.githubusercontent.com/${repo}/main/${found.pagePath}`, '_blank');
                } else throw new Error("Invalid username or password.");
            } catch (err) { showMessage(err.message, 'error'); } 
            finally { document.getElementById('loginLoader').classList.add('hidden'); }
        };

        async function fetchDataForEdit() {
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            document.getElementById('fetchLoader').classList.remove('hidden');
            try {
                const existing = await fetchGithubFile(repo, token, config.dataFilePath);
                if (!existing) throw new Error("No database found.");
                currentLogs = JSON.parse(atob(existing.content));
                editingIndex = currentLogs.findIndex(u => u.username === document.getElementById('editUser').value && u.password === document.getElementById('editPass').value);
                if(editingIndex > -1) {
                    const item = currentLogs[editingIndex];
                    document.getElementById('u_password').value = item.password;
                    document.getElementById('u_mobile').value = item.mobile;
                    document.getElementById('u_idCard').value = item.idCard;
                    document.getElementById('edit-fields').classList.remove('hidden');
                    showMessage("Data fetched!", "success");
                } else throw new Error("User not found.");
            } catch (err) { showMessage(err.message, "error"); } 
            finally { document.getElementById('fetchLoader').classList.add('hidden'); }
        }

        async function saveEditedData() {
            const token = document.getElementById('ghToken').value.trim();
            const repo = document.getElementById('ghRepo').value.trim();
            document.getElementById('editLoader').classList.remove('hidden');
            try {
                const item = currentLogs[editingIndex];
                item.password = document.getElementById('u_password').value;
                item.mobile = document.getElementById('u_mobile').value;
                item.idCard = document.getElementById('u_idCard').value;
                await updateGithubFile(repo, token, config.dataFilePath, JSON.stringify(currentLogs, null, 2), `Update: ${item.username}`);
                await updateGithubFile(repo, token, item.pagePath, generateProfileHTML(item.username, item.idCard, item.mobile), `Sync Profile: ${item.username}`);
                showMessage("Updated successfully!", "success");
            } catch (err) { showMessage(err.message, "error"); } 
            finally { document.getElementById('editLoader').classList.add('hidden'); }
        }

        function showMessage(text, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = 'status-box ' + (type === 'success' ? 'success-msg' : 'error-msg');
        }
    </script>
</body>
</html>
