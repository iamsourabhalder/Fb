<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub API Portal</title>
    <style>
        /* Modern Base Styles (Replacement for Tailwind) */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --bg-gray: #f3f4f6;
            --text-gray: #374151;
            --border-gray: #d1d5db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            color: var(--text-gray);
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
            color: #1f2937;
        }

        /* API Settings Box */
        .api-config {
            background-color: #eff6ff;
            border: 1px solid #dbeafe;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .api-config label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e40af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        /* Form Elements */
        .form-group { margin-bottom: 1rem; }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-medium;
            margin-bottom: 0.25rem;
        }

        input[type="text"], input[type="password"], input[type="tel"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-gray);
            border-radius: 0.375rem;
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .file-input {
            font-size: 0.875rem;
            color: #6b7280;
            width: 100%;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-gray);
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            padding: 0.5rem 0;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
        }

        .tab-active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.375rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.2s;
        }

        .btn-blue { background-color: var(--primary); }
        .btn-blue:hover { background-color: var(--primary-hover); }
        .btn-green { background-color: var(--success); }
        .btn-green:hover { background-color: var(--success-hover); }

        /* Loader */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            text-align: center;
        }

        .success-msg { background-color: #dcfce7; color: #15803d; }
        .error-msg { background-color: #fee2e2; color: #b91c1c; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GitHub User Portal</h1>
        
        <div class="api-config">
            <label>GitHub API Configuration</label>
            <div class="form-group">
                <input type="password" id="ghToken" placeholder="GitHub PAT Token">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <input type="text" id="ghRepo" placeholder="Owner/Repo-Name">
            </div>
        </div>

        <div class="tabs">
            <button onclick="switchTab('register')" id="tab-register" class="tab tab-active">Register</button>
            <button onclick="switchTab('login')" id="tab-login" class="tab">Login</button>
        </div>

        <!-- Registration Form -->
        <div id="register-section">
            <form id="submissionForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" required>
                </div>
                <div class="form-group">
                    <label>ID Card Number</label>
                    <input type="text" id="idCard" required>
                </div>
                <div class="form-group">
                    <label>Upload Target File</label>
                    <input type="file" id="targetFile" class="file-input" required>
                </div>
                <button type="submit" id="regBtn" class="btn btn-blue">
                    <span id="regLoader" class="loader hidden"></span>
                    <span>Submit & Register</span>
                </button>
            </form>
        </div>

        <!-- Login Form -->
        <div id="login-section" class="hidden">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-green">
                    <span id="loginLoader" class="loader hidden"></span>
                    <span>Login & Open Page</span>
                </button>
            </form>
        </div>

        <div id="status" class="status-box hidden"></div>
    </div>

    <script>
        const config = { dataFilePath: 'data.json' };

        function switchTab(tab) {
            const regSect = document.getElementById('register-section');
            const loginSect = document.getElementById('login-section');
            const regTab = document.getElementById('tab-register');
            const loginTab = document.getElementById('tab-login');
            
            if (tab === 'register') {
                regSect.classList.remove('hidden');
                loginSect.classList.add('hidden');
                regTab.classList.add('tab-active');
                loginTab.classList.remove('tab-active');
            } else {
                regSect.classList.add('hidden');
                loginSect.classList.remove('hidden');
                loginTab.classList.add('tab-active');
                regTab.classList.remove('tab-active');
            }
        }

        async function updateFile(repo, token, path, content, message) {
            const getResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            let sha = "";
            if (getResponse.status === 200) {
                const fileData = await getResponse.json();
                sha = fileData.sha;
            }
            const putResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message,
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: sha || undefined
                })
            });
            if (!putResponse.ok) {
                const err = await putResponse.json();
                throw new Error(err.message || putResponse.statusText);
            }
        }

        document.getElementById('submissionForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const mobile = document.getElementById('mobile').value;
            const idCard = document.getElementById('idCard').value;
            const file = document.getElementById('targetFile').files[0];
            
            if(!token || !repo) { showMessage("Please fill API settings", "error"); return; }
            
            const localUrl = URL.createObjectURL(file);
            document.getElementById('regLoader').classList.remove('hidden');
            
            try {
                const getResp = await fetch(`https://api.github.com/repos/${repo}/contents/${config.dataFilePath}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                let logs = [];
                if (getResp.status === 200) {
                    const data = await getResp.json();
                    logs = JSON.parse(atob(data.content));
                }
                
                const pagePath = `pages/${user.toLowerCase().replace(/\s+/g, '-')}-${Date.now()}.html`;
                logs.push({ username: user, password: pass, mobile, idCard, fileName: file.name, pagePath, timestamp: new Date().toISOString() });
                
                await updateFile(repo, token, config.dataFilePath, JSON.stringify(logs, null, 2), `Reg: ${user}`);

                const html = `<!DOCTYPE html><html><body style="font-family:sans-serif;text-align:center;padding:50px;"><h1>Welcome ${user}</h1><p>ID: ${idCard}</p><p>Mobile: ${mobile}</p></body></html>`;
                await updateFile(repo, token, pagePath, html, `Profile: ${user}`);

                showMessage('Registration Successful!', 'success');
                setTimeout(() => window.location.href = localUrl, 1500);
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                document.getElementById('regLoader').classList.add('hidden');
            }
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const token = document.getElementById('ghToken').value;
            const repo = document.getElementById('ghRepo').value;
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            if(!token || !repo) { showMessage("Please fill API settings", "error"); return; }

            document.getElementById('loginLoader').classList.remove('hidden');

            try {
                const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${config.dataFilePath}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (resp.status !== 200) throw new Error("Database not found.");

                const data = await resp.json();
                const logs = JSON.parse(atob(data.content));
                const found = logs.find(u => u.username === user && u.password === pass);

                if (found) {
                    showMessage('Login Successful!', 'success');
                    const pageUrl = `https://raw.githubusercontent.com/${repo}/main/${found.pagePath}`;
                    setTimeout(() => window.open(pageUrl, '_blank'), 1500);
                } else {
                    throw new Error("Invalid username or password.");
                }
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                document.getElementById('loginLoader').classList.add('hidden');
            }
        };

        function showMessage(text, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = 'status-box ' + (type === 'success' ? 'success-msg' : 'error-msg');
        }
    </script>
</body>
</html>
